name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run all

      - name: Publish package
        run: npm publish --provenance --access public

      - name: Write release notes
        run: |
          node --input-type=module <<'EOF'
          import { readFile, writeFile } from 'node:fs/promises';
          import { join } from 'node:path';

          import { extractLatestChangelogSection } from './scripts/update-changelog.js';

          const changelog_text = await readFile('CHANGELOG.md', 'utf8');
          const release_notes_path = join(process.env.RUNNER_TEMP, 'release-notes.md');

          await writeFile(
            release_notes_path,
            `${extractLatestChangelogSection(changelog_text)}\n`,
          );
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run:
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME"
          --notes-file "$RUNNER_TEMP/release-notes.md"
