workspace:
  type: git.workspace
  source:
    kind: repo
    ids:
      - abbott
      - castello
  materialize:
    kind: worktree
    mode: pooled
    ref: main

on:
  patram: $class == task and status == ready

jobs:
  reset-worktree:
    uses: core/run
    with:
      command: git reset --hard main && git clean -fd
    next: install-dependencies

  install-dependencies:
    uses: core/run
    with:
      command: npm ci --prefer-offline --no-audit --fund=false
    next: implement-task

  implement-task:
    uses: core/run-codex
    with:
      prompt: |
        Implement the task described in ${{ task.path }}.
        Set Status to `done` on completion.
      reasoning: high
    next: approval

  approval:
    uses: core/approval
    with:
      title: Approve task implementation for ${{ task.path }}
      message: Approve the completed Codex work for this task.
      options: [approve]
    next: handoff

  handoff:
    uses: core/worktree-handoff
    with:
      branch: review/ready/${{ task.id.replaceAll(':', '-') }}
    next: done

  done:
    end: success
